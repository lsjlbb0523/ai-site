<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日营销方案 - AI生意参谋</title>
    <meta name="description" content="为情人节、五一、国庆等节日生成节日营销方案">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">AI生意参谋</a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="marketing-plan.html">营销方案生成</a></li>
                <li><a href="wechat-copy.html">朋友圈文案</a></li>
                <li><a href="festival-plan.html">节日营销方案</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main>
        <section class="section">
            <div class="container">
                <h1 class="page-title">节日营销方案生成器</h1>
                <p class="page-subtitle">选择节日，AI为您生成完整的节日营销方案</p>

                <a href="index.html" class="back-link">← 返回首页</a>

                <!-- 表单区域 -->
                <div class="form-container">
                    <form id="festival-form">
                        <div class="form-grid">
                            <!-- 节日选择 -->
                            <div class="form-group">
                                <label class="form-label" for="festival">选择节日 *</label>
                                <select class="form-select" id="festival" name="festival" required>
                                    <option value="">请选择节日</option>
                                    <option value="情人节">情人节（2月14日）</option>
                                    <option value="五一">五一劳动节（5月1日）</option>
                                    <option value="国庆">国庆节（10月1日）</option>
                                    <option value="春节">春节（农历正月初一）</option>
                                    <option value="中秋">中秋节（农历八月十五）</option>
                                    <option value="圣诞">圣诞节（12月25日）</option>
                                    <option value="元旦">元旦（1月1日）</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="generate-button">生成节日营销方案</button>
                    </form>

                    <!-- 加载动画 -->
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p class="loading-text">AI正在生成节日营销方案...</p>
                    </div>
                </div>

                <!-- 结果展示区域 -->
                <div class="result-container" id="result-container">
                    <!-- 节日营销活动 -->
                    <div class="result-section">
                        <h3 class="result-title">节日营销活动</h3>
                        <div class="result-content">
                            <h4 id="festival-activity" style="color: #e0e7ff; margin-bottom: 0.5rem;"></h4>
                            <p id="activity-strategy"></p>
                        </div>
                    </div>

                    <!-- 关键要点 -->
                    <div class="result-section">
                        <h3 class="result-title">关键要点</h3>
                        <div class="result-content">
                            <ul id="key-points-list" class="result-list"></ul>
                        </div>
                    </div>

                    <!-- 推广渠道 -->
                    <div class="result-section">
                        <h3 class="result-title">推广渠道</h3>
                        <div class="result-content">
                            <ul id="promotion-channels-list" class="result-list"></ul>
                        </div>
                    </div>

                    <!-- 宣传文案 -->
                    <div class="result-section">
                        <h3 class="result-title">宣传文案</h3>
                        <div class="result-content">
                            <p id="festival-copy"></p>
                            <button class="copy-button cta-button" data-target="festival-copy" style="margin-top: 1rem; padding: 0.5rem 1rem; font-size: 1rem;">复制文案</button>
                        </div>
                    </div>

                    <!-- 短视频创意 -->
                    <div class="result-section">
                        <h3 class="result-title">短视频创意</h3>
                        <div class="result-content">
                            <p id="festival-video"></p>
                        </div>
                    </div>

                    <!-- 促销建议 -->
                    <div class="result-section">
                        <h3 class="result-title">促销建议</h3>
                        <div class="result-content">
                            <p id="promotion-timing"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                © 2025 AI生意参谋 | 帮助门店老板自动生成赚钱的营销方案
            </p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
